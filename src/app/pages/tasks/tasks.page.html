<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title>Tareas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense" class="ion-no-border">
    <ion-toolbar>
      <ion-title size="large">Tareas</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="tasks-container">
    <!-- Category Filters -->
    <div class="category-filters">
      <ion-button 
        fill="clear" 
        class="filter-chip"
        [class.active]="selectedCategoryId() === null"
        (click)="setCategoryFilter(null)"
      >
        Todas
      </ion-button>
      @for (cat of categories(); track cat.id) {
        <ion-button 
          fill="clear" 
          class="filter-chip"
          [class.active]="selectedCategoryId() === cat.id"
          [style.--color]="cat.color"
          (click)="setCategoryFilter(cat.id)"
        >
          {{ cat.name }}
        </ion-button>
      }
      <ion-button fill="clear" color="medium" class="manage-cat-btn" (click)="openCategoryManager()">
        <ion-icon name="folder-open-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <!-- Add Task Section -->
    <div class="add-task-wrapper">
      <ion-item lines="none" class="apple-input-item">
        <ion-input
          placeholder="Nueva tarea..."
          [ngModel]="newTaskTitle()"
          (ngModelChange)="newTaskTitle.set($event)"
          (keyup.enter)="addTask()"
          class="apple-input"
        ></ion-input>
        <ion-button fill="clear" slot="end" (click)="addTask()" [disabled]="!newTaskTitle().trim()" class="add-btn">
          <ion-icon name="add"></ion-icon>
        </ion-button>
      </ion-item>
    </div>

    <!-- List Section -->
    <ion-list class="apple-list">
      @for (task of filteredTasks(); track task.id) {
        <ion-item-sliding>
          <ion-item lines="none" class="apple-item">
            <ion-button 
              fill="clear" 
              slot="start" 
              (click)="toggleTask(task.id)"
              class="check-btn"
            >
              <ion-icon 
                [name]="task.completed ? 'checkmark-circle' : 'radioButtonOffOutline'"
                [color]="task.completed ? 'primary' : 'medium'"
              ></ion-icon>
            </ion-button>
            <ion-label [class.completed]="task.completed" class="apple-label">
              <h2>{{ task.title }}</h2>
            </ion-label>
            @if (task.categoryId) {
              <div 
                class="category-dot" 
                [style.background-color]="getCategoryColor(task.categoryId)"
              ></div>
            }
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="deleteTask(task.id)" class="delete-option">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      } @empty {
        <div class="empty-state">
          <p>Todo listo por hoy.</p>
        </div>
      }
    </ion-list>
  </div>
</ion-content>
