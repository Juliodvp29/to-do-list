<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" color="primary">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Add Category -->
  <div class="add-category-wrapper">
    <div class="add-category-card">
      <div class="color-preview" [style.background-color]="newCategoryColor()">
        <input type="color"
          [ngModel]="newCategoryColor()"
          (ngModelChange)="newCategoryColor.set($event)"
        />
      </div>
      <ion-input
        [placeholder]="editingCategoryId() ? 'Editar categoría...' : 'Nueva categoría...'"
        [ngModel]="newCategoryName()"
        (ngModelChange)="newCategoryName.set($event)"
        (keyup.enter)="addCategory()"
        class="apple-input"
      ></ion-input>
      
      @if (editingCategoryId()) {
        <ion-button fill="clear" (click)="cancelEdit()" color="medium">
          Cancelar
        </ion-button>
      }

      @if (newCategoryName().trim()) {
        <ion-button fill="clear" (click)="addCategory()" class="add-btn">
          <ion-icon [name]="editingCategoryId() ? 'checkmark-circle' : 'add-circle'" slot="icon-only"></ion-icon>
        </ion-button>
      }
    </div>
  </div>

  <!-- Category List -->
  <ion-list class="apple-list">
    @for (cat of categories(); track cat.id) {
      <ion-item-sliding>
        <ion-item lines="none" class="apple-item">
          <div class="category-color-dot" slot="start" [style.background-color]="cat.color"></div>
          <ion-label class="apple-label">{{ cat.name }}</ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="startEdit(cat)" class="edit-option">
            <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
          </ion-item-option>
          <ion-item-option color="danger" (click)="deleteCategory(cat.id)" class="delete-option">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    } @empty {
      <div class="empty-state">
        <ion-icon name="folder-open-outline" class="empty-icon"></ion-icon>
        <p>Crea tu primera categoría arriba.</p>
      </div>
    }
  </ion-list>

</ion-content>
