<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Add Category -->
  <div class="add-category-wrapper">
    <ion-item lines="none" class="apple-input-item">
      <ion-input
        placeholder="Nueva categoría..."
        [ngModel]="newCategoryName()"
        (ngModelChange)="newCategoryName.set($event)"
        (keyup.enter)="addCategory()"
        class="apple-input"
      ></ion-input>
      <input type="color" [ngModel]="newCategoryColor()" (ngModelChange)="newCategoryColor.set($event)" class="color-picker" />
      <ion-button fill="clear" slot="end" (click)="addCategory()" [disabled]="!newCategoryName().trim()" class="add-btn">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-item>
  </div>

  <!-- List -->
  <ion-list class="apple-list">
    @for (cat of categories(); track cat.id) {
      <ion-item-sliding>
        <ion-item lines="none" class="apple-item">
          <div class="category-dot" slot="start" [style.background-color]="cat.color"></div>
          <ion-label class="apple-label">{{ cat.name }}</ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteCategory(cat.id)" class="delete-option">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    } @empty {
      <div class="empty-state">
        <p>No hay categorías.</p>
      </div>
    }
  </ion-list>
</ion-content>
